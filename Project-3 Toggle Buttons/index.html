<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project-3 Toggle Buttons</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jost:ital,wght@0,100..900;1,100..900&family=Merienda:wght@300..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="option">
            <div class="content">
                <h4>🔔 Notification</h4>
                <p>Recieve alerts for new activity</p>
            </div>
            <div class="toggle-button-div">
                <input type="checkbox" class="toggle-btn" id="notification-toggle-btn" checked>
            </div>
        </div>

        <div class="option">
            <div class="content">
                <h4>🌙 Dark Mode</h4>
                <p>Switch to a darker interface</p>
            </div>

            <div class="toggle-button-div">
                <input type="checkbox" class="toggle-btn green-toggle" checked>
            </div>
        </div>

        <!-- Security -->
        <div class="option">
            <div class="content">
                <h4>🔒 Two-factor Auth</h4>
                <p>Add an extra layer of security</p>
            </div>

            <div class="toggle-button-div">
                <input type="checkbox" class="toggle-btn purple-toggle" checked>
            </div>
        </div>

        <!-- Weekly Digest -->
        <div class="option">
            <div class="content">
                <h4>📰 Weekly Digest</h4>
                <p>Get summary every Monday</p>
            </div>

            <div class="toggle-button-div">
                <input type="checkbox" class="toggle-btn orange-toggle" checked>
            </div>
        </div>

        <!-- Location -->
        <div class="option">
            <div class="content">
                <h4>📍 Location Access</h4>
                <p>Allow use of current location</p>
            </div>

            <div class="toggle-button-div">
                <input type="checkbox" class="toggle-btn red-toggle" checked>
            </div>
        </div>
    </div>
</body>
</html>
