<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project-2 Profile Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jost:ital,wght@0,100..900;1,100..900&family=Merienda:wght@300..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="top-container">
            <div class="profile">
                <div class="profile-name">KC</div>
            </div>
        </div>
        <div class="bottom-container">
            <div class="profile-info">
                <h2>Krishna Chourasiya</h2>
                <p>@kc30 - Web Developer</p>
            </div>
            <div class="prile-more-info">
                <p>Web Developer & open thinker. I turn complex system into interfaces people actually enjoy using.</p>
            </div>
            <div class="tags">
                <span>UI Design</span>
                <span>Open Source</span>
                <span>Figma</span>
                <span>CSS</span>
            </div>
            <div class="stats">
                <div class="stat-box">
                    <h3>48</h3>
                    <p>Projects</p>
                </div>

                <div class="stat-box">
                    <h3>12k</h3>
                    <p>Followers</p>
                </div>

                <div class="stat-box">
                    <h3>210</h3>
                    <p>Following</p>
                </div>

            </div>
            <div class="buttons">
                <button class="follow-btn">Follow</button>
                <button class="message-btn">Message</button>
            </div>

            <div class="footer-links">
                <a href="#">Twitter</a>
                <a href="#">GitHub</a>
                <a href="#">LinkedIn</a>
                <a href="#">Portfolio</a>
            </div>
        </div>
    </div>
</body>
</html>
